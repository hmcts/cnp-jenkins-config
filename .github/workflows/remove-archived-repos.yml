name: Remove archived repos from deployment controls

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  remove-archived-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Find and remove archived repos from deployment-controls.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "Fetching archived repos with CFT Jenkins topics..."
          gh search repos --owner hmcts --topic jenkins-cft-a-c --limit 200 --json fullName,isArchived \
            --jq '.[] | select(.isArchived == true) | .fullName' > /tmp/archived.txt
          gh search repos --owner hmcts --topic jenkins-cft-d-i --limit 200 --json fullName,isArchived \
            --jq '.[] | select(.isArchived == true) | .fullName' >> /tmp/archived.txt
          gh search repos --owner hmcts --topic jenkins-cft-j-z --limit 200 --json fullName,isArchived \
            --jq '.[] | select(.isArchived == true) | .fullName' >> /tmp/archived.txt

          sort -u /tmp/archived.txt > /tmp/archived-unique.txt
          echo "Found $(wc -l < /tmp/archived-unique.txt) archived repos"

          REMOVED=0
          while IFS= read -r repo; do
            repo_url="https://github.com/${repo}.git"
            if grep -qF "${repo_url}" deployment-controls.yml; then
              echo "Removing: ${repo_url}"
              # Remove the repo line and its deployment-enabled line below it
              grep -n "${repo_url}" deployment-controls.yml | cut -d: -f1 | while read -r line_num; do
                sed -i "${line_num},$((line_num + 1))d" deployment-controls.yml
              done
              REMOVED=$((REMOVED + 1))
            fi
          done < /tmp/archived-unique.txt

          echo "Removed ${REMOVED} archived repo(s) from deployment-controls.yml"
          echo "REMOVED=${REMOVED}" >> "$GITHUB_ENV"

      - name: Raise PR if changes were made
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n $(git status -s) ]]; then
            BRANCH="auto-remove-archived-repos-$(date +%Y%m%d)"
            git config user.name hmcts-platform-operations
            git config user.email hmcts-platform-operations@hmcts.net
            git checkout -b "${BRANCH}"
            git add deployment-controls.yml
            git commit -m "chore: remove ${REMOVED} archived repo(s) from deployment-controls.yml"
            git push origin "${BRANCH}"
            gh pr create \
              --title "Scheduled: remove archived repos from deployment-controls.yml" \
              --body "This PR was automatically generated by the weekly scheduled workflow.

          Removed **${REMOVED}** archived GitHub repo(s) from \`deployment-controls.yml\`.

          Please review and merge to keep the deployment controls list tidy." \
              --base master \
              --head "${BRANCH}"
          else
            echo "No archived repos found in deployment-controls.yml - no PR needed."
          fi
